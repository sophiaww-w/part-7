<!DOCTYPE html>
<html>
<head>
  <title>All Organizations</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
  <b>Fundraising Organization</b>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>
</div>

<h1 style="text-align:center;">All Locations</h1>

<div id="list"></div>

<script src="data.js"></script>

<script>
document.getElementById("list").innerHTML =
  orgData.map(o => `
    <div class="card">

      <h3>${o.name}</h3>
      <p>${o.city}, ${o.country}</p>

      <button onclick="window.location.href='org.html?id=${o.id}'">
        Learn More
      </button>

      <button onclick="window.location.href='${o.stripe}'">
        Donate Now
      </button>

    </div>
  `).join("");
</script>

</body>
</html>
